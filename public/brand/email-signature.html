<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALAI Email Signature</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;">

    <!-- Email Signature Container -->
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="max-width: 400px; margin: 0; padding: 0; border-collapse: collapse;">
        <tr>
            <td style="padding: 0;">

                <!-- Green Accent Line -->
                <div style="width: 100%; height: 3px; background-color: #00E5A0; margin-bottom: 16px;"></div>

                <!-- Logo / Company Name -->
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 12px;">
                    <tr>
                        <td style="padding: 0;">
                            <span style="font-size: 28px; font-weight: bold; color: #09090b; letter-spacing: -0.02em;">
                                ALA<span style="color: #00E5A0;">I</span>
                            </span>
                        </td>
                    </tr>
                </table>

                <!-- Name and Title -->
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 12px;">
                    <tr>
                        <td style="padding: 0;">
                            <div style="font-size: 16px; font-weight: bold; color: #09090b; margin-bottom: 2px;">
                                {{name}}
                            </div>
                            <div style="font-size: 14px; color: #888888;">
                                {{title}}
                            </div>
                        </td>
                    </tr>
                </table>

                <!-- Company -->
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 16px;">
                    <tr>
                        <td style="padding: 0;">
                            <div style="font-size: 14px; color: #09090b; font-weight: 600;">
                                ALAI Holding AS
                            </div>
                        </td>
                    </tr>
                </table>

                <!-- Contact Information -->
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 0;">
                    <tr>
                        <td style="padding: 2px 0; font-size: 14px; color: #09090b;">
                            <a href="mailto:{{email}}" style="color: #09090b; text-decoration: none;">
                                {{email}}
                            </a>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 2px 0; font-size: 14px; color: #09090b;">
                            {{phone}}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 2px 0; font-size: 14px;">
                            <a href="https://alai.no" style="color: #00E5A0; text-decoration: none; font-weight: 600;">
                                alai.no
                            </a>
                        </td>
                    </tr>
                </table>

                <!-- Footer Info -->
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e5e5;">
                    <tr>
                        <td style="padding: 0; font-size: 12px; color: #888888; line-height: 1.5;">
                            Ilemoen 4A, 2040 Kløfta, Norway<br>
                            Org.nr. 932 516 136
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

</body>
</html>
